esphome:
  name: esp32s3temp

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:

mqtt:
  broker: "10.94.117.111"

ota:
  - platform: esphome

wifi:
  ssid: "Timi's Aircraft 2.4"
  password: "cocacola"
  ap:
    ssid: "Flappy m"
    password: "cocacola"

captive_portal:

web_server:
  port: 80

i2c:
  sda: GPIO8
  scl: GPIO9
  scan: true

sensor:
  - platform: aht10
    variant: AHT20
    temperature:
      name: "AHT Temperature"
      id: aht_temperature
    humidity:
      name: "AHT Humidity"
      id: aht_humidity
    update_interval: 15s

  - platform: bme280_i2c
    address: 0x76
    temperature:
      name: "BME Temperature"
      id: bme_temperature
    humidity:
      name: "BME Humidity"
      id: bme_humidity
    pressure:
      name: "BME Pressure"
      id: bme_pressure
    update_interval: 15s

binary_sensor:
  - platform: gpio
    name: "Rain Sensor"
    id: rain_sensor
    pin:
      number: GPIO1
      inverted: true
    filters:
      - delayed_on_off: 50ms

  - platform: gpio
    name: "GPIO3 Switch"
    id: gpio3_switch
    pin:
      number: GPIO3
      mode: INPUT_PULLUP
      inverted: true
    filters:
      - delayed_on_off: 50ms

switch:
  - platform: gpio
    pin: GPIO7
    name: "Control LED"
    id: control_led

  - platform: gpio
    pin: GPIO2
    name: "Buzzer"
    id: buzzer
