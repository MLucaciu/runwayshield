<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports — Runway Shield</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-app: #0a0e17;
  --bg-panel: #101520;
  --bg-header: rgba(12, 18, 30, 0.94);
  --bg-row: rgba(18, 26, 42, 0.4);
  --bg-row-hover: rgba(24, 36, 58, 0.7);
  --bg-row-alt: rgba(14, 22, 36, 0.35);
  --bg-ctrl-btn: rgba(24, 34, 56, 0.6);
  --bg-ctrl-btn-hover: rgba(30, 46, 72, 0.9);
  --bg-modal-overlay: rgba(0, 0, 0, 0.75);
  --bg-modal: #121a2a;
  --bg-scrollbar-thumb: rgba(100, 130, 170, 0.18);
  --bg-scrollbar-thumb-hover: rgba(100, 130, 170, 0.32);
  --border-accent: rgba(56, 189, 210, 0.14);
  --border-accent-subtle: rgba(56, 189, 210, 0.07);
  --border-ctrl: rgba(50, 66, 96, 0.6);
  --text-primary: #e8edf5;
  --text-secondary: #8b9bc0;
  --text-muted: #5a6a8a;
  --text-dim: #3d4d6a;
  --accent: #38bdd2;
  --accent-light: #5dd8ec;
  --accent-glow: rgba(56, 189, 210, 0.35);
  --accent-bg: rgba(56, 189, 210, 0.08);
  --sev-red: #f04858;
  --sev-amber: #f0a030;
  --sev-blue: #38bdd2;
  --sev-green: #34d399;
  --status-green: #34d399;
  --font-ui: "DM Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --font-mono: "JetBrains Mono", "Fira Code", ui-monospace, monospace;
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --shadow-card: 0 1px 3px rgba(0,0,0,0.3), 0 0 0 1px rgba(56,189,210,0.04);
}

[data-theme="light"] {
  --bg-app: #f0f3f8;
  --bg-panel: #ffffff;
  --bg-header: rgba(255,255,255,0.94);
  --bg-row: rgba(240,243,248,0.6);
  --bg-row-hover: rgba(224,229,238,0.8);
  --bg-row-alt: rgba(248,249,252,0.6);
  --bg-ctrl-btn: rgba(240,243,248,0.9);
  --bg-ctrl-btn-hover: #e0e5ee;
  --bg-modal-overlay: rgba(0, 0, 0, 0.5);
  --bg-modal: #ffffff;
  --bg-scrollbar-thumb: rgba(80,100,140,0.18);
  --bg-scrollbar-thumb-hover: rgba(80,100,140,0.32);
  --border-accent: rgba(20,148,168,0.16);
  --border-accent-subtle: rgba(20,148,168,0.10);
  --border-ctrl: #c8d0dd;
  --text-primary: #1a2236;
  --text-secondary: #4a5670;
  --text-muted: #6b7a96;
  --text-dim: #96a3b8;
  --accent: #1494a8;
  --accent-light: #0e7a8c;
  --accent-glow: rgba(20,148,168,0.2);
  --accent-bg: rgba(20,148,168,0.06);
  --sev-red: #dc3545;
  --sev-amber: #d4880a;
  --sev-blue: #1494a8;
  --sev-green: #12a366;
  --status-green: #12a366;
}

html, body { height: 100%; }

body {
  font-family: var(--font-ui);
  background: var(--bg-app);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  transition: background 0.35s ease, color 0.35s ease;
}

.page {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.5rem 1.15rem;
  background: var(--bg-header);
  backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--border-accent);
  position: sticky;
  top: 0;
  z-index: 100;
  flex-shrink: 0;
}

.logo {
  display: flex;
  align-items: center;
  gap: 0.55rem;
}

.logo-text {
  font-size: 0.95rem;
  font-weight: 700;
  letter-spacing: 0.01em;
  background: linear-gradient(135deg, var(--accent-light), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 0.55rem;
}

.back-link {
  display: flex;
  align-items: center;
  gap: 0.35rem;
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--text-secondary);
  text-decoration: none;
  padding: 0.3rem 0.65rem;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-ctrl);
  background: var(--bg-ctrl-btn);
  transition: all 0.18s ease;
}

.back-link:hover {
  background: var(--bg-ctrl-btn-hover);
  color: var(--text-primary);
  border-color: var(--accent);
  box-shadow: 0 0 8px var(--accent-glow);
}

.theme-toggle {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  border-radius: var(--radius-md);
  border: 1px solid var(--border-ctrl);
  background: var(--bg-ctrl-btn);
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s, transform 0.2s, box-shadow 0.2s;
  color: var(--text-secondary);
}

.theme-toggle:hover {
  background: var(--bg-ctrl-btn-hover);
  border-color: var(--accent);
  box-shadow: 0 0 10px var(--accent-glow);
  transform: scale(1.08);
}

.theme-toggle svg {
  width: 15px;
  height: 15px;
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
}

.theme-toggle:hover svg { transform: rotate(25deg); }

.content {
  flex: 1;
  padding: 1.25rem 1.5rem;
  max-width: 1400px;
  margin: 0 auto;
  width: 100%;
}

.page-title-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
  flex-wrap: wrap;
  gap: 0.75rem;
}

.page-title {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--text-primary);
}

.page-count {
  font-size: 0.72rem;
  font-weight: 600;
  font-family: var(--font-mono);
  color: var(--accent-light);
  background: var(--accent-bg);
  padding: 0.2rem 0.7rem;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-accent);
}

.toolbar-row {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 0.85rem;
  flex-wrap: wrap;
  align-items: center;
}

.filter-select {
  font-family: var(--font-ui);
  font-size: 0.68rem;
  font-weight: 500;
  padding: 0.3rem 0.6rem;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-ctrl);
  background: var(--bg-ctrl-btn);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.18s;
  outline: none;
}

.filter-select:hover, .filter-select:focus {
  border-color: var(--accent);
  color: var(--text-primary);
}

.filter-select option {
  background: var(--bg-panel);
  color: var(--text-primary);
}

.toolbar-spacer { flex: 1; }

.btn-delete {
  font-family: var(--font-ui);
  font-size: 0.66rem;
  font-weight: 700;
  padding: 0.3rem 0.7rem;
  border-radius: var(--radius-sm);
  border: 1px solid rgba(240,72,88,0.3);
  background: rgba(240,72,88,0.1);
  color: var(--sev-red);
  cursor: pointer;
  transition: all 0.18s;
  outline: none;
  display: none;
}

.btn-delete:hover {
  background: rgba(240,72,88,0.2);
  border-color: var(--sev-red);
  box-shadow: 0 0 8px rgba(240,72,88,0.2);
}

.btn-delete.visible { display: inline-flex; align-items: center; gap: 0.3rem; }

.table-wrap {
  background: var(--bg-panel);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border-accent-subtle);
  overflow: hidden;
  box-shadow: var(--shadow-card);
}

.table-scroll {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.74rem;
}

thead th {
  position: sticky;
  top: 0;
  z-index: 2;
  background: var(--bg-panel);
  text-align: left;
  padding: 0.65rem 0.75rem;
  font-size: 0.6rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border-accent);
  white-space: nowrap;
  user-select: none;
  -webkit-user-select: none;
  cursor: pointer;
  transition: color 0.15s;
}

thead th:hover { color: var(--accent); }
thead th.sorted { color: var(--accent-light); }
thead th.no-sort { cursor: default; }
thead th.no-sort:hover { color: var(--text-muted); }

thead th .sort-arrow {
  display: inline-block;
  margin-left: 0.3em;
  font-size: 0.55rem;
  opacity: 0.4;
  transition: opacity 0.15s;
}

thead th.sorted .sort-arrow { opacity: 1; }

tbody tr {
  cursor: pointer;
  transition: background 0.15s;
}

tbody tr:nth-child(odd) { background: var(--bg-row); }
tbody tr:nth-child(even) { background: var(--bg-row-alt); }
tbody tr:hover { background: var(--bg-row-hover); }

td {
  padding: 0.55rem 0.75rem;
  border-bottom: 1px solid var(--border-accent-subtle);
  white-space: nowrap;
  vertical-align: middle;
}

.td-check {
  width: 32px;
  text-align: center;
  padding-left: 0.5rem;
  padding-right: 0;
}

.td-check input[type="checkbox"] {
  width: 14px;
  height: 14px;
  cursor: pointer;
  accent-color: var(--accent);
}

.sev-badge {
  display: inline-block;
  font-size: 0.56rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  font-family: var(--font-mono);
  padding: 0.14rem 0.5rem;
  border-radius: var(--radius-sm);
  text-transform: uppercase;
}

.sev-high { color: var(--sev-red); background: rgba(240,72,88,0.12); border: 1px solid rgba(240,72,88,0.2); }
.sev-medium { color: var(--sev-amber); background: rgba(240,160,48,0.12); border: 1px solid rgba(240,160,48,0.2); }
.sev-low { color: var(--sev-blue); background: rgba(56,189,210,0.12); border: 1px solid rgba(56,189,210,0.2); }

.status-badge {
  display: inline-block;
  font-size: 0.56rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  font-family: var(--font-mono);
  text-transform: uppercase;
}

.st-acknowledged { color: var(--sev-amber); }
.st-resolved { color: var(--sev-green); }
.st-closed { color: var(--text-dim); }
.st-active { color: var(--sev-red); }

.td-mono {
  font-family: var(--font-mono);
  font-size: 0.66rem;
  color: var(--text-secondary);
  font-variant-numeric: tabular-nums;
}

.td-cap { text-transform: capitalize; font-weight: 600; }

.empty-state {
  padding: 4rem 2rem;
  text-align: center;
  color: var(--text-dim);
  font-size: 0.9rem;
  font-style: italic;
}

/* ── Pagination ──────────────────────────────────────────────── */
.pagination-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.55rem 0.85rem;
  border-top: 1px solid var(--border-accent-subtle);
  font-size: 0.66rem;
  color: var(--text-muted);
  flex-wrap: wrap;
  gap: 0.5rem;
}

.pagination-info {
  font-family: var(--font-mono);
  font-size: 0.62rem;
}

.pagination-controls {
  display: flex;
  align-items: center;
  gap: 0.25rem;
}

.pagination-btn {
  font-family: var(--font-ui);
  font-size: 0.62rem;
  font-weight: 600;
  padding: 0.22rem 0.55rem;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-ctrl);
  background: var(--bg-ctrl-btn);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.15s;
  outline: none;
}

.pagination-btn:hover:not(:disabled) {
  border-color: var(--accent);
  color: var(--text-primary);
}

.pagination-btn:disabled {
  opacity: 0.35;
  cursor: default;
}

.pagination-btn.active {
  background: var(--accent-bg);
  border-color: var(--accent);
  color: var(--accent-light);
}

.page-size-select {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  padding: 0.2rem 0.35rem;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-ctrl);
  background: var(--bg-ctrl-btn);
  color: var(--text-secondary);
  cursor: pointer;
  outline: none;
}

/* ── Modal ────────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: var(--bg-modal-overlay);
  backdrop-filter: blur(6px);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.25s, visibility 0.25s;
}

.modal-overlay.open {
  opacity: 1;
  visibility: visible;
}

.modal {
  background: var(--bg-modal);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border-accent);
  box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(56,189,210,0.06);
  width: 90%;
  max-width: 900px;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transform: scale(0.96) translateY(8px);
  transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
}

.modal-overlay.open .modal {
  transform: scale(1) translateY(0);
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.8rem 1rem;
  border-bottom: 1px solid var(--border-accent-subtle);
  flex-shrink: 0;
}

.modal-title {
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--text-primary);
}

.modal-close {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 30px;
  height: 30px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-ctrl);
  background: var(--bg-ctrl-btn);
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 1rem;
  line-height: 1;
  transition: all 0.18s;
}

.modal-close:hover {
  background: rgba(240,72,88,0.15);
  border-color: var(--sev-red);
  color: var(--sev-red);
}

.modal-body {
  flex: 1;
  overflow-y: auto;
  padding: 1rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.modal-video-wrap {
  width: 100%;
  border-radius: var(--radius-md);
  overflow: hidden;
  background: #000;
  aspect-ratio: 16/9;
  position: relative;
}

.modal-video-wrap video,
.modal-video-wrap img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.modal-no-video {
  width: 100%;
  aspect-ratio: 16/9;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.3);
  border-radius: var(--radius-md);
  color: var(--text-dim);
  font-size: 0.82rem;
  font-style: italic;
}

.modal-details {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 0.6rem;
}

.modal-detail {
  display: flex;
  flex-direction: column;
  gap: 0.15rem;
  padding: 0.5rem 0.7rem;
  background: var(--bg-row);
  border-radius: var(--radius-md);
  border: 1px solid var(--border-accent-subtle);
}

.modal-detail-label {
  font-size: 0.56rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
}

.modal-detail-value {
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--text-primary);
  font-family: var(--font-mono);
}

.modal-logs-title {
  font-size: 0.62rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--accent);
  margin-top: 0.25rem;
}

.modal-logs {
  display: flex;
  flex-direction: column;
  gap: 0.25rem;
}

.modal-log-entry {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.68rem;
  color: var(--text-secondary);
  padding: 0.3rem 0;
  border-bottom: 1px solid var(--border-accent-subtle);
}

.modal-log-action {
  font-weight: 700;
  font-family: var(--font-mono);
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--accent-light);
  min-width: 90px;
}

.modal-log-time {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--text-muted);
  flex-shrink: 0;
}

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg-scrollbar-thumb); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--bg-scrollbar-thumb-hover); }

/* ── Show on Map Button ──────────────────────────────────────────── */
.btn-map {
  font-family: var(--font-ui);
  font-size: 0.66rem;
  font-weight: 700;
  padding: 0.3rem 0.7rem;
  border-radius: var(--radius-sm);
  border: 1px solid rgba(56,189,210,0.3);
  background: rgba(56,189,210,0.1);
  color: var(--accent);
  cursor: pointer;
  transition: all 0.18s;
  outline: none;
  display: none;
  align-items: center;
  gap: 0.3rem;
}

.btn-map:hover {
  background: rgba(56,189,210,0.2);
  border-color: var(--accent);
  box-shadow: 0 0 8px var(--accent-glow);
}

.btn-map.visible { display: inline-flex; }

/* ── Map Modal ───────────────────────────────────────────────────── */
.map-modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 1100;
  background: var(--bg-modal-overlay);
  backdrop-filter: blur(6px);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.25s, visibility 0.25s;
}

.map-modal-overlay.open {
  opacity: 1;
  visibility: visible;
}

.map-modal {
  background: var(--bg-modal);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border-accent);
  box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(56,189,210,0.06);
  width: 92%;
  max-width: 1000px;
  height: 80vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transform: scale(0.96) translateY(8px);
  transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
}

.map-modal-overlay.open .map-modal {
  transform: scale(1) translateY(0);
}

.map-modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.8rem 1rem;
  border-bottom: 1px solid var(--border-accent-subtle);
  flex-shrink: 0;
}

.map-modal-title {
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--text-primary);
}

.map-modal-count {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  color: var(--accent-light);
  background: var(--accent-bg);
  padding: 0.15rem 0.5rem;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-accent);
  margin-left: 0.5rem;
}

.map-modal-body {
  flex: 1;
  position: relative;
}

#mapModalMap {
  width: 100%;
  height: 100%;
}

.alert-map-pin {
  background: none !important;
  border: none !important;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
}

.leaflet-popup-content {
  font-family: var(--font-ui);
}

@media (max-width: 768px) {
  .content { padding: 0.75rem; }
  .modal { width: 96%; max-height: 95vh; }
  .map-modal { width: 96%; height: 85vh; }
  .modal-details { grid-template-columns: repeat(2, 1fr); }
  table { font-size: 0.68rem; }
  td, thead th { padding: 0.45rem 0.55rem; }
}
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="24" height="24">
          <defs>
            <clipPath id="shield-left"><rect x="0" y="0" width="32" height="64"/></clipPath>
            <clipPath id="shield-right"><rect x="32" y="0" width="32" height="64"/></clipPath>
            <linearGradient id="shield-grad" x1="0" y1="0" x2="0.3" y2="1">
              <stop offset="0%" stop-color="#5dd8ec"/>
              <stop offset="100%" stop-color="#1494a8"/>
            </linearGradient>
          </defs>
          <path d="M32 4 L56 16 V34 C56 48 44 58 32 62 C20 58 8 48 8 34 V16 Z" fill="url(#shield-grad)" clip-path="url(#shield-left)"/>
          <path d="M32 4 L56 16 V34 C56 48 44 58 32 62 C20 58 8 48 8 34 V16 Z" fill="white" clip-path="url(#shield-right)"/>
          <path d="M32 4 L56 16 V34 C56 48 44 58 32 62 C20 58 8 48 8 34 V16 Z" fill="none" stroke="#5dd8ec" stroke-width="1.5"/>
        </svg>
        <span class="logo-text">Runway Shield</span>
      </div>
      <div class="header-right">
        <a href="/" class="back-link">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          Dashboard
        </a>
        <button class="theme-toggle" id="themeToggle" title="Toggle theme">
          <svg id="sunIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg id="moonIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="content">
      <div class="page-title-row">
        <h1 class="page-title">Reports</h1>
        <span class="page-count" id="totalCount">0 reports</span>
      </div>

      <div class="toolbar-row">
        <select class="filter-select" id="filterSeverity">
          <option value="">All severities</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
        <select class="filter-select" id="filterStatus">
          <option value="">All statuses</option>
          <option value="acknowledged">Acknowledged</option>
          <option value="resolved">Resolved</option>
          <option value="closed">Closed</option>
        </select>
        <select class="filter-select" id="filterCamera">
          <option value="">All cameras</option>
        </select>
        <select class="filter-select" id="filterObject">
          <option value="">All objects</option>
        </select>
        <div class="toolbar-spacer"></div>
        <button class="btn-map" id="btnShowMap">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span id="mapLabel">Show on Map</span>
        </button>
        <button class="btn-delete" id="btnDeleteSelected">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          <span id="deleteLabel">Delete selected</span>
        </button>
        <button class="btn-delete" id="btnDeleteAll">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          Delete all
        </button>
      </div>

      <div class="table-wrap">
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th class="td-check no-sort"><input type="checkbox" id="selectAll" title="Select all"></th>
                <th data-col="id">ID <span class="sort-arrow">&#9660;</span></th>
                <th data-col="severity">Severity <span class="sort-arrow">&#9660;</span></th>
                <th data-col="object_type">Object <span class="sort-arrow">&#9660;</span></th>
                <th data-col="zone_id">Zone <span class="sort-arrow">&#9660;</span></th>
                <th data-col="camera_id">Camera <span class="sort-arrow">&#9660;</span></th>
                <th data-col="status">Status <span class="sort-arrow">&#9660;</span></th>
                <th data-col="created_at" class="sorted">Created <span class="sort-arrow">&#9660;</span></th>
                <th data-col="acknowledged_by">Acked by <span class="sort-arrow">&#9660;</span></th>
                <th data-col="acknowledged_at">Acked at <span class="sort-arrow">&#9660;</span></th>
                <th data-col="duration">Duration <span class="sort-arrow">&#9660;</span></th>
              </tr>
            </thead>
            <tbody id="reportsTbody"></tbody>
          </table>
        </div>
        <div class="empty-state" id="emptyState" style="display:none;">No reports yet. Acknowledged alerts will appear here.</div>
        <div class="pagination-row" id="paginationRow">
          <div class="pagination-info" id="paginationInfo"></div>
          <div class="pagination-controls">
            <span style="font-size:0.6rem;color:var(--text-muted);margin-right:0.3rem;">Rows:</span>
            <select class="page-size-select" id="pageSizeSelect">
              <option value="15" selected>15</option>
              <option value="25">25</option>
              <option value="50">50</option>
            </select>
            <button class="pagination-btn" id="pgFirst" title="First page">&laquo;</button>
            <button class="pagination-btn" id="pgPrev" title="Previous page">&lsaquo;</button>
            <span id="pgNumbers"></span>
            <button class="pagination-btn" id="pgNext" title="Next page">&rsaquo;</button>
            <button class="pagination-btn" id="pgLast" title="Last page">&raquo;</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Video modal -->
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title" id="modalTitle">Alert Details</span>
          <button class="modal-close" id="modalClose">&times;</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
      </div>
    </div>

    <!-- Map modal -->
    <div class="map-modal-overlay" id="mapModalOverlay">
      <div class="map-modal">
        <div class="map-modal-header">
          <div style="display:flex;align-items:center;">
            <span class="map-modal-title">Alert Locations</span>
            <span class="map-modal-count" id="mapAlertCount">0 alerts</span>
          </div>
          <button class="modal-close" id="mapModalClose">&times;</button>
        </div>
        <div class="map-modal-body">
          <div id="mapModalMap"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
(function() {
  "use strict";

  var reports = [];
  var sortCol = "created_at";
  var sortAsc = false;
  var selectedIds = new Set();
  var currentPage = 1;
  var pageSize = 15;

  var tbody = document.getElementById("reportsTbody");
  var emptyState = document.getElementById("emptyState");
  var totalCount = document.getElementById("totalCount");
  var modalOverlay = document.getElementById("modalOverlay");
  var modalClose = document.getElementById("modalClose");
  var modalTitle = document.getElementById("modalTitle");
  var modalBody = document.getElementById("modalBody");
  var filterSeverity = document.getElementById("filterSeverity");
  var filterStatus = document.getElementById("filterStatus");
  var filterCamera = document.getElementById("filterCamera");
  var filterObject = document.getElementById("filterObject");
  var selectAllCb = document.getElementById("selectAll");
  var btnDeleteSelected = document.getElementById("btnDeleteSelected");
  var btnDeleteAll = document.getElementById("btnDeleteAll");
  var deleteLabel = document.getElementById("deleteLabel");
  var pageSizeSelect = document.getElementById("pageSizeSelect");
  var pgFirst = document.getElementById("pgFirst");
  var pgPrev = document.getElementById("pgPrev");
  var pgNext = document.getElementById("pgNext");
  var pgLast = document.getElementById("pgLast");
  var pgNumbers = document.getElementById("pgNumbers");
  var pgInfo = document.getElementById("paginationInfo");

  var btnShowMap = document.getElementById("btnShowMap");
  var mapLabel = document.getElementById("mapLabel");
  var mapModalOverlay = document.getElementById("mapModalOverlay");
  var mapModalClose = document.getElementById("mapModalClose");
  var mapAlertCount = document.getElementById("mapAlertCount");
  var mapInstance = null;
  var mapMarkers = [];

  var SEV_ORDER = { high: 0, medium: 1, low: 2 };

  // ── Theme ──────────────────────────────────────────────────────
  var theme = localStorage.getItem("rws-theme") || "dark";
  document.documentElement.setAttribute("data-theme", theme);
  updateThemeIcon();

  function updateThemeIcon() {
    document.getElementById("sunIcon").style.display = theme === "dark" ? "" : "none";
    document.getElementById("moonIcon").style.display = theme === "dark" ? "none" : "";
  }

  document.getElementById("themeToggle").addEventListener("click", function() {
    theme = theme === "dark" ? "light" : "dark";
    document.documentElement.setAttribute("data-theme", theme);
    localStorage.setItem("rws-theme", theme);
    updateThemeIcon();
  });

  // ── Helpers ────────────────────────────────────────────────────
  function esc(s) {
    if (!s) return "";
    var d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }

  function fmtDateTime(iso) {
    if (!iso) return "\u2014";
    try {
      var d = new Date(iso);
      return d.toLocaleDateString([], { month: "short", day: "numeric", year: "numeric" }) +
             " " + d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    } catch(e) { return iso; }
  }

  function fmtDuration(created, closed) {
    if (!created) return "\u2014";
    var start = new Date(created);
    var end = closed ? new Date(closed) : new Date();
    var diff = Math.max(0, Math.floor((end - start) / 1000));
    if (diff < 60) return diff + "s";
    if (diff < 3600) return Math.floor(diff / 60) + "m " + (diff % 60) + "s";
    return Math.floor(diff / 3600) + "h " + Math.floor((diff % 3600) / 60) + "m";
  }

  // ── Data ───────────────────────────────────────────────────────
  async function loadReports() {
    try {
      var res = await fetch("/api/alerts/reports?limit=500");
      reports = await res.json();
      populateFilters();
      render();
    } catch(e) {
      console.error("Failed to load reports", e);
    }
  }

  function populateFilters() {
    var camMap = {};
    var objects = new Set();
    reports.forEach(function(r) {
      if (r.camera_id) camMap[r.camera_id] = r.camera_name || r.camera_id;
      if (r.object_type) objects.add(r.object_type);
    });

    var curCam = filterCamera.value;
    filterCamera.innerHTML = '<option value="">All cameras</option>';
    Object.keys(camMap).forEach(function(id) {
      var opt = document.createElement("option");
      opt.value = id;
      opt.textContent = camMap[id];
      filterCamera.appendChild(opt);
    });
    filterCamera.value = curCam;

    var curObj = filterObject.value;
    filterObject.innerHTML = '<option value="">All objects</option>';
    Array.from(objects).sort().forEach(function(o) {
      var opt = document.createElement("option");
      opt.value = o;
      opt.textContent = o.charAt(0).toUpperCase() + o.slice(1);
      filterObject.appendChild(opt);
    });
    filterObject.value = curObj;
  }

  function getFiltered() {
    var sev = filterSeverity.value;
    var st = filterStatus.value;
    var cam = filterCamera.value;
    var obj = filterObject.value;
    return reports.filter(function(r) {
      if (sev && r.severity !== sev) return false;
      if (st && r.status !== st) return false;
      if (cam && r.camera_id !== cam) return false;
      if (obj && r.object_type !== obj) return false;
      return true;
    });
  }

  function getSorted(data) {
    var col = sortCol;
    var asc = sortAsc;
    return data.slice().sort(function(a, b) {
      var va = a[col], vb = b[col];
      if (col === "severity") {
        va = SEV_ORDER[va] !== undefined ? SEV_ORDER[va] : 9;
        vb = SEV_ORDER[vb] !== undefined ? SEV_ORDER[vb] : 9;
      }
      if (col === "duration") {
        var sa = new Date(a.created_at), ea = a.closed_at ? new Date(a.closed_at) : new Date();
        var sb = new Date(b.created_at), eb = b.closed_at ? new Date(b.closed_at) : new Date();
        va = ea - sa;
        vb = eb - sb;
      }
      if (va == null) va = "";
      if (vb == null) vb = "";
      if (typeof va === "string") {
        var cmp = va.localeCompare(vb);
        return asc ? cmp : -cmp;
      }
      return asc ? va - vb : vb - va;
    });
  }

  // ── Selection ─────────────────────────────────────────────────
  function updateDeleteButtons() {
    var count = selectedIds.size;
    if (count > 0) {
      btnDeleteSelected.classList.add("visible");
      deleteLabel.textContent = "Delete selected (" + count + ")";
      btnShowMap.classList.add("visible");
      mapLabel.textContent = "Show on Map (" + count + ")";
    } else {
      btnDeleteSelected.classList.remove("visible");
      btnShowMap.classList.remove("visible");
    }
    btnDeleteAll.classList.toggle("visible", reports.length > 0);
  }

  function syncSelectAll() {
    var pageItems = getCurrentPageItems();
    if (!pageItems.length) { selectAllCb.checked = false; selectAllCb.indeterminate = false; return; }
    var allChecked = pageItems.every(function(r) { return selectedIds.has(r.id); });
    var someChecked = pageItems.some(function(r) { return selectedIds.has(r.id); });
    selectAllCb.checked = allChecked;
    selectAllCb.indeterminate = !allChecked && someChecked;
  }

  selectAllCb.addEventListener("change", function() {
    var pageItems = getCurrentPageItems();
    if (selectAllCb.checked) {
      pageItems.forEach(function(r) { selectedIds.add(r.id); });
    } else {
      pageItems.forEach(function(r) { selectedIds.delete(r.id); });
    }
    updateDeleteButtons();
    renderRows();
  });

  // ── Pagination helpers ────────────────────────────────────────
  var _lastSorted = [];

  function getCurrentPageItems() {
    var start = (currentPage - 1) * pageSize;
    return _lastSorted.slice(start, start + pageSize);
  }

  function getTotalPages() {
    return Math.max(1, Math.ceil(_lastSorted.length / pageSize));
  }

  function clampPage() {
    var total = getTotalPages();
    if (currentPage > total) currentPage = total;
    if (currentPage < 1) currentPage = 1;
  }

  function renderPagination() {
    var total = getTotalPages();
    var count = _lastSorted.length;
    var start = (currentPage - 1) * pageSize + 1;
    var end = Math.min(currentPage * pageSize, count);

    pgInfo.textContent = count ? start + "\u2013" + end + " of " + count : "0 reports";

    pgFirst.disabled = currentPage <= 1;
    pgPrev.disabled = currentPage <= 1;
    pgNext.disabled = currentPage >= total;
    pgLast.disabled = currentPage >= total;

    pgNumbers.innerHTML = "";
    var maxButtons = 5;
    var startPage = Math.max(1, currentPage - Math.floor(maxButtons / 2));
    var endPage = Math.min(total, startPage + maxButtons - 1);
    if (endPage - startPage < maxButtons - 1) startPage = Math.max(1, endPage - maxButtons + 1);

    for (var p = startPage; p <= endPage; p++) {
      var btn = document.createElement("button");
      btn.className = "pagination-btn" + (p === currentPage ? " active" : "");
      btn.textContent = p;
      btn.dataset.page = p;
      btn.addEventListener("click", function() {
        currentPage = parseInt(this.dataset.page);
        renderRows();
        renderPagination();
        syncSelectAll();
      });
      pgNumbers.appendChild(btn);
    }
  }

  pgFirst.addEventListener("click", function() { currentPage = 1; renderRows(); renderPagination(); syncSelectAll(); });
  pgPrev.addEventListener("click", function() { currentPage--; clampPage(); renderRows(); renderPagination(); syncSelectAll(); });
  pgNext.addEventListener("click", function() { currentPage++; clampPage(); renderRows(); renderPagination(); syncSelectAll(); });
  pgLast.addEventListener("click", function() { currentPage = getTotalPages(); renderRows(); renderPagination(); syncSelectAll(); });

  pageSizeSelect.addEventListener("change", function() {
    pageSize = parseInt(pageSizeSelect.value);
    currentPage = 1;
    renderRows();
    renderPagination();
    syncSelectAll();
  });

  // ── Render ─────────────────────────────────────────────────────
  function render() {
    var filtered = getFiltered();
    _lastSorted = getSorted(filtered);

    totalCount.textContent = _lastSorted.length + " report" + (_lastSorted.length !== 1 ? "s" : "");

    document.querySelectorAll("thead th[data-col]").forEach(function(th) {
      th.classList.toggle("sorted", th.dataset.col === sortCol);
      var arrow = th.querySelector(".sort-arrow");
      if (arrow) arrow.innerHTML = (th.dataset.col === sortCol && sortAsc) ? "&#9650;" : "&#9660;";
    });

    clampPage();
    renderRows();
    renderPagination();
    updateDeleteButtons();
    syncSelectAll();
  }

  function renderRows() {
    var pageItems = getCurrentPageItems();

    if (!_lastSorted.length) {
      tbody.innerHTML = "";
      emptyState.style.display = "";
      return;
    }
    emptyState.style.display = "none";

    tbody.innerHTML = "";
    pageItems.forEach(function(r) {
      var tr = document.createElement("tr");

      var tdCb = document.createElement("td");
      tdCb.className = "td-check";
      var cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = selectedIds.has(r.id);
      cb.addEventListener("click", function(e) { e.stopPropagation(); });
      cb.addEventListener("change", function(e) {
        if (cb.checked) { selectedIds.add(r.id); } else { selectedIds.delete(r.id); }
        updateDeleteButtons();
        syncSelectAll();
      });
      tdCb.appendChild(cb);
      tr.appendChild(tdCb);

      var rest = document.createElement("template");
      rest.innerHTML =
        '<td class="td-mono">' + esc(String(r.id)) + '</td>' +
        '<td><span class="sev-badge sev-' + esc(r.severity) + '">' + esc((r.severity || "").toUpperCase()) + '</span></td>' +
        '<td class="td-cap">' + esc(r.object_type) + '</td>' +
        '<td>' + esc(r.zone_name || r.zone_id) + '</td>' +
        '<td>' + esc(r.camera_name || r.camera_id) + '</td>' +
        '<td><span class="status-badge st-' + esc(r.status) + '">' + esc((r.status || "").toUpperCase()) + '</span></td>' +
        '<td class="td-mono">' + esc(fmtDateTime(r.created_at)) + '</td>' +
        '<td>' + esc(r.acknowledged_by || "\u2014") + '</td>' +
        '<td class="td-mono">' + esc(fmtDateTime(r.acknowledged_at)) + '</td>' +
        '<td class="td-mono">' + esc(fmtDuration(r.created_at, r.closed_at)) + '</td>';
      while (rest.content.firstChild) tr.appendChild(rest.content.firstChild);

      tr.addEventListener("click", function() { openModal(r); });
      tbody.appendChild(tr);
    });
  }

  // ── Sorting ────────────────────────────────────────────────────
  document.querySelectorAll("thead th[data-col]").forEach(function(th) {
    th.addEventListener("click", function() {
      var col = th.dataset.col;
      if (!col) return;
      if (sortCol === col) { sortAsc = !sortAsc; }
      else { sortCol = col; sortAsc = false; }
      currentPage = 1;
      render();
    });
  });

  // ── Filters ────────────────────────────────────────────────────
  function onFilterChange() { currentPage = 1; selectedIds.clear(); render(); }
  filterSeverity.addEventListener("change", onFilterChange);
  filterStatus.addEventListener("change", onFilterChange);
  filterCamera.addEventListener("change", onFilterChange);
  filterObject.addEventListener("change", onFilterChange);

  // ── Delete ─────────────────────────────────────────────────────
  btnDeleteSelected.addEventListener("click", async function() {
    var ids = Array.from(selectedIds);
    if (!ids.length) return;
    if (!confirm("Delete " + ids.length + " selected report" + (ids.length > 1 ? "s" : "") + "?")) return;
    try {
      await fetch("/api/alerts/delete", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ ids: ids }),
      });
      selectedIds.clear();
      await loadReports();
    } catch(e) { console.error("Delete failed", e); }
  });

  btnDeleteAll.addEventListener("click", async function() {
    if (!confirm("Delete ALL " + reports.length + " reports? This cannot be undone.")) return;
    try {
      await fetch("/api/alerts/delete", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ all: true }),
      });
      selectedIds.clear();
      await loadReports();
    } catch(e) { console.error("Delete all failed", e); }
  });

  // ── Modal ──────────────────────────────────────────────────────
  function closeModal() {
    var liveImg = document.getElementById("modalLive");
    if (liveImg) liveImg.src = "";
    var vid = document.getElementById("modalVideo");
    if (vid) { vid.pause(); vid.removeAttribute("src"); vid.load(); }
    modalOverlay.classList.remove("open");
    modalBody.innerHTML = "";
  }

  modalClose.addEventListener("click", closeModal);
  modalOverlay.addEventListener("click", function(e) {
    if (e.target === modalOverlay) closeModal();
  });
  document.addEventListener("keydown", function(e) {
    if (e.key === "Escape") closeModal();
  });

  async function openModal(alertRow) {
    var alert = alertRow;
    try {
      var freshRes = await fetch("/api/alerts/" + alertRow.id);
      if (freshRes.ok) {
        var freshData = await freshRes.json();
        freshData.camera_name = alertRow.camera_name || freshData.camera_name;
        alert = freshData;
      }
    } catch(e) {}

    var zoneName = alert.zone_name || alert.zone_id || "Unknown Zone";
    var cameraName = alert.camera_name || alert.camera_id || "Unknown Camera";
    modalTitle.textContent = (alert.object_type || "Alert") + " in " + zoneName + " \u2014 #" + alert.id;

    var html = '';

    var camEncoded = encodeURIComponent(alert.camera_id);
    var createdMs = new Date(alert.created_at).getTime();
    var ageSeconds = (Date.now() - createdMs) / 1000;
    var isRecent = alert.status === "active" || ageSeconds < 30;

    if (isRecent) {
      var offset = Math.max(0, Math.min(30, Math.round(ageSeconds)));
      var liveUrl = "/api/stream/" + camEncoded + "/live?annotated=1" +
                    (offset > 0 ? "&offset=" + offset : "");
      html += '<div class="modal-video-wrap">' +
              '<img id="modalLive" src="' + esc(liveUrl) + '" alt="Live stream">' +
              '</div>';
    } else {
      var historyUrl = "/api/stream/" + camEncoded +
                       "/history?t=" + (createdMs / 1000) + "&annotated=1";
      html += '<div class="modal-video-wrap">' +
              '<video id="modalVideo" controls preload="auto">' +
              '<source src="' + esc(historyUrl) + '" type="video/mp4">' +
              '</video></div>';
    }

    html += '<div class="modal-details">';
    html += buildDetail("ID", "#" + alert.id);
    html += buildDetail("Severity", (alert.severity || "").toUpperCase());
    html += buildDetail("Object", alert.object_type);
    html += buildDetail("Zone", zoneName);
    html += buildDetail("Camera", cameraName);
    html += buildDetail("Status", (alert.status || "").toUpperCase());
    html += buildDetail("Created", fmtDateTime(alert.created_at));
    html += buildDetail("Last updated", fmtDateTime(alert.updated_at));
    html += buildDetail("Acked by", alert.acknowledged_by || "\u2014");
    html += buildDetail("Acked at", fmtDateTime(alert.acknowledged_at));
    html += buildDetail("Closed at", fmtDateTime(alert.closed_at));
    html += buildDetail("Duration", fmtDuration(alert.created_at, alert.closed_at));
    if (alert.gps_lat != null && alert.gps_lng != null) {
      html += buildDetail("GPS", alert.gps_lat.toFixed(5) + ", " + alert.gps_lng.toFixed(5));
    }
    html += '</div>';

    modalBody.innerHTML = html;

    var logs = alert.logs || [];
    if (!logs.length) {
      try {
        var logsRes = await fetch("/api/alerts/" + alert.id + "/logs");
        logs = await logsRes.json();
      } catch(e) {}
    }
    if (logs.length) {
      var logsHtml = '<div class="modal-logs-title">Audit Log</div><div class="modal-logs">';
      logs.forEach(function(log) {
        var details = "";
        if (log.details) {
          try { details = JSON.stringify(JSON.parse(log.details)); } catch(e) { details = log.details; }
        }
        logsHtml += '<div class="modal-log-entry">' +
          '<span class="modal-log-action">' + esc(log.action) + '</span>' +
          '<span class="modal-log-time">' + esc(fmtDateTime(log.timestamp)) + '</span>' +
          (details ? '<span style="color:var(--text-dim);font-size:0.6rem;">' + esc(details) + '</span>' : '') +
          '</div>';
      });
      logsHtml += '</div>';
      modalBody.insertAdjacentHTML("beforeend", logsHtml);
    }

    var vid = document.getElementById("modalVideo");
    if (vid) {
      vid.addEventListener("error", function() {
        vid.parentElement.innerHTML = '<div class="modal-no-video">No video available for this time range</div>';
      });
    }
    var liveImg = document.getElementById("modalLive");
    if (liveImg) {
      liveImg.addEventListener("error", function() {
        liveImg.parentElement.innerHTML = '<div class="modal-no-video">Live stream unavailable</div>';
      });
    }

    modalOverlay.classList.add("open");
  }

  function buildDetail(label, value) {
    return '<div class="modal-detail"><span class="modal-detail-label">' +
           esc(label) + '</span><span class="modal-detail-value">' +
           esc(value || "\u2014") + '</span></div>';
  }

  // ── Map Modal ─────────────────────────────────────────────────
  var SEV_COLORS = { high: "#f04858", medium: "#f0a030", low: "#38bdd2" };

  function makeAlertPinSvg(color) {
    return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 42" width="28" height="36">' +
      '<path d="M16 0C7.2 0 0 7.2 0 16c0 12 16 26 16 26s16-14 16-26C32 7.2 24.8 0 16 0z" fill="' + color + '"/>' +
      '<path d="M16 0C7.2 0 0 7.2 0 16c0 12 16 26 16 26s16-14 16-26C32 7.2 24.8 0 16 0z" fill="none" stroke="rgba(0,0,0,0.25)" stroke-width="1"/>' +
      '<circle cx="16" cy="15" r="7" fill="rgba(255,255,255,0.9)"/>' +
      '<text x="16" y="19" text-anchor="middle" font-size="10" font-weight="bold" font-family="sans-serif" fill="' + color + '">!</text>' +
      '</svg>';
  }

  function closeMapModal() {
    mapModalOverlay.classList.remove("open");
    if (mapInstance) {
      mapInstance.remove();
      mapInstance = null;
    }
    mapMarkers = [];
  }

  mapModalClose.addEventListener("click", closeMapModal);
  mapModalOverlay.addEventListener("click", function(e) {
    if (e.target === mapModalOverlay) closeMapModal();
  });
  document.addEventListener("keydown", function(e) {
    if (e.key === "Escape" && mapModalOverlay.classList.contains("open")) closeMapModal();
  });

  btnShowMap.addEventListener("click", function() {
    var selected = reports.filter(function(r) { return selectedIds.has(r.id); });
    var withGps = selected.filter(function(r) { return r.gps_lat != null && r.gps_lng != null; });

    if (!withGps.length) {
      alert("None of the selected alerts have GPS coordinates.");
      return;
    }

    mapAlertCount.textContent = withGps.length + " alert" + (withGps.length !== 1 ? "s" : "");
    mapModalOverlay.classList.add("open");

    setTimeout(function() {
      if (mapInstance) {
        mapInstance.remove();
        mapInstance = null;
      }
      mapMarkers = [];

      mapInstance = L.map("mapModalMap", {
        zoomControl: true,
        scrollWheelZoom: true,
      });

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: '&copy; <a href="https://www.openstreetmap.org/">OSM</a>',
        maxZoom: 19,
      }).addTo(mapInstance);

      var bounds = [];
      withGps.forEach(function(r) {
        var latlng = [r.gps_lat, r.gps_lng];
        bounds.push(latlng);

        var color = SEV_COLORS[r.severity] || SEV_COLORS.medium;
        var icon = L.divIcon({
          html: makeAlertPinSvg(color),
          className: "alert-map-pin",
          iconSize: [28, 36],
          iconAnchor: [14, 36],
          popupAnchor: [0, -34],
        });

        var marker = L.marker(latlng, { icon: icon }).addTo(mapInstance);

        var sevLabel = (r.severity || "").toUpperCase();
        var zoneName = r.zone_name || r.zone_id || "—";
        var camName = r.camera_name || r.camera_id || "—";

        marker.bindPopup(
          '<div style="min-width:150px;font-family:\'DM Sans\',sans-serif;">' +
            '<div style="font-weight:700;font-size:12px;margin-bottom:4px;">Alert #' + r.id + '</div>' +
            '<div style="font-size:11px;margin-bottom:2px;"><strong>Object:</strong> ' + esc(r.object_type) + '</div>' +
            '<div style="font-size:11px;margin-bottom:2px;"><strong>Zone:</strong> ' + esc(zoneName) + '</div>' +
            '<div style="font-size:11px;margin-bottom:2px;"><strong>Camera:</strong> ' + esc(camName) + '</div>' +
            '<div style="font-size:11px;margin-bottom:2px;"><strong>Severity:</strong> ' +
              '<span style="color:' + color + ';font-weight:600;">' + esc(sevLabel) + '</span></div>' +
            '<div style="font-size:11px;margin-bottom:2px;"><strong>Status:</strong> ' + esc((r.status || "").toUpperCase()) + '</div>' +
            '<div style="font-size:10px;opacity:0.6;margin-top:4px;">' +
              r.gps_lat.toFixed(5) + ', ' + r.gps_lng.toFixed(5) + '</div>' +
          '</div>'
        );
        mapMarkers.push(marker);
      });

      if (bounds.length === 1) {
        mapInstance.setView(bounds[0], 17);
      } else {
        mapInstance.fitBounds(bounds, { padding: [40, 40], maxZoom: 17 });
      }
    }, 100);
  });

  // ── Init ───────────────────────────────────────────────────────
  loadReports();
  setInterval(loadReports, 15000);

})();
  </script>
</body>
</html>
