<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Runway Shield</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; }

    .header {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 24px; background: #1e293b; border-bottom: 1px solid #334155;
    }
    .header h1 { font-size: 20px; font-weight: 600; }

    .container { max-width: 960px; margin: 24px auto; padding: 0 24px; }

    .camera-select {
      display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
    }
    .camera-select select {
      background: #1e293b; color: #e2e8f0; border: 1px solid #475569;
      padding: 8px 12px; border-radius: 6px; font-size: 14px;
    }
    .status-dot {
      width: 10px; height: 10px; border-radius: 50%; display: inline-block;
    }
    .status-dot.live { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .status-dot.off  { background: #ef4444; }

    .video-wrapper {
      position: relative; background: #000; border-radius: 8px; overflow: hidden;
      aspect-ratio: 16/9; margin-bottom: 16px;
    }
    .video-wrapper img, .video-wrapper video {
      width: 100%; height: 100%; object-fit: contain; display: block;
    }
    .video-wrapper .overlay {
      position: absolute; top: 12px; left: 12px;
      background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 4px;
      font-size: 12px; font-weight: 600; letter-spacing: 0.5px;
    }
    .overlay.live-badge { color: #f87171; }
    .overlay.playback-badge { color: #60a5fa; }

    .controls {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .controls button {
      background: #334155; color: #e2e8f0; border: 1px solid #475569;
      padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
      transition: background 0.15s; white-space: nowrap;
    }
    .controls button:hover { background: #475569; }
    .controls button.active { background: #3b82f6; border-color: #3b82f6; }
    .controls button.live-btn { background: #dc2626; border-color: #dc2626; font-weight: 600; }
    .controls button.live-btn.dimmed { background: #334155; border-color: #475569; font-weight: 400; }
    .controls .spacer { flex: 1; }
    .controls .offset-input {
      background: #1e293b; color: #e2e8f0; border: 1px solid #475569;
      padding: 8px 10px; border-radius: 6px; font-size: 13px; width: 70px;
      text-align: center;
    }
    .controls label { font-size: 12px; color: #94a3b8; }

    .toggle-switch {
      display: flex; align-items: center; gap: 8px;
    }
    .toggle-switch label { font-size: 12px; color: #94a3b8; cursor: pointer; user-select: none; }
    .toggle-track {
      width: 38px; height: 20px; border-radius: 10px; background: #475569;
      position: relative; cursor: pointer; transition: background 0.2s;
    }
    .toggle-track.on { background: #3b82f6; }
    .toggle-track .toggle-knob {
      width: 16px; height: 16px; border-radius: 50%; background: #e2e8f0;
      position: absolute; top: 2px; left: 2px; transition: left 0.2s;
    }
    .toggle-track.on .toggle-knob { left: 20px; }

    .segments {
      background: #1e293b; border: 1px solid #334155; border-radius: 8px;
      padding: 16px; margin-top: 16px;
    }
    .segments h3 { font-size: 14px; margin-bottom: 8px; color: #94a3b8; }
    .segments ul { list-style: none; }
    .segments li {
      padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 13px;
      font-family: monospace;
    }
    .segments li:hover { background: #334155; }
    .segments li.active { background: #1e40af; }
    .segments li .progress {
      height: 2px; background: #3b82f6; margin-top: 4px; border-radius: 1px;
      width: 0%; transition: width 0.3s linear;
    }
    .segments .empty { color: #64748b; font-size: 13px; }
  </style>
</head>
<body>
  <div class="header">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="32" height="32">
      <defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#1e40af"/></linearGradient></defs>
      <path d="M32 4 L56 16 V34 C56 48 44 58 32 62 C20 58 8 48 8 34 V16 Z" fill="url(#sg)" stroke="#60a5fa" stroke-width="1.5"/>
      <path d="M32 18 L24 30 H30 V42 H34 V30 H40 Z" fill="white" opacity="0.9"/>
    </svg>
    <h1>Runway Shield</h1>
  </div>

  <div class="container">
    <div class="camera-select">
      <select id="cameraSelect"></select>
      <span class="status-dot off" id="statusDot"></span>
      <span id="statusText" style="font-size:13px; color:#94a3b8;">Disconnected</span>
    </div>

    <div class="video-wrapper">
      <img id="videoFeedImg" alt="No feed" src="">
      <video id="videoFeedVideo" autoplay style="display:none;"></video>
      <div class="overlay live-badge" id="modeBadge">LIVE</div>
    </div>

    <div class="controls">
      <button id="btnLive" class="live-btn">LIVE</button>
      <button id="btnBack5">-5s</button>
      <button id="btnBack10">-10s</button>
      <button id="btnBack30">-30s</button>
      <button id="btnBack120">-120s</button>
      <div class="spacer"></div>
      <div class="toggle-switch" id="annotationToggle">
        <label>Annotations</label>
        <div class="toggle-track" id="toggleTrack">
          <div class="toggle-knob"></div>
        </div>
      </div>
      <div class="spacer"></div>
      <label>Custom:</label>
      <input type="number" id="customOffset" class="offset-input" min="0" max="9999" value="0" placeholder="sec">
      <button id="btnCustom">Go</button>
    </div>

    <div class="segments">
      <h3>Recorded segments</h3>
      <ul id="segmentList"><li class="empty">No segments yet</li></ul>
    </div>
  </div>

  <script>
    const imgFeed = document.getElementById("videoFeedImg");
    const vidFeed = document.getElementById("videoFeedVideo");
    const cameraSelect = document.getElementById("cameraSelect");
    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");
    const modeBadge = document.getElementById("modeBadge");
    const segmentList = document.getElementById("segmentList");
    const btnLive = document.getElementById("btnLive");

    const toggleTrack = document.getElementById("toggleTrack");

    let currentCamera = null;
    let mode = "live";             // "live" | "history"
    let annotated = false;
    let segments = [];
    let activeSegmentIndex = -1;
    let progressTimer = null;

    toggleTrack.addEventListener("click", () => {
      annotated = !annotated;
      toggleTrack.classList.toggle("on", annotated);
      // Re-apply current view with new annotation setting
      if (mode === "live") {
        seekTo(parseInt(document.getElementById("customOffset").value) || 0);
      } else if (activeSegmentIndex >= 0) {
        playSegmentByIndex(activeSegmentIndex);
      }
    });

    // ---- Show img (MJPEG) or video (MP4) ----
    function showImg() {
      imgFeed.style.display = "block";
      vidFeed.style.display = "none";
      vidFeed.pause();
      vidFeed.removeAttribute("src");
      clearInterval(progressTimer);
    }
    function showVid() {
      imgFeed.style.display = "none";
      imgFeed.src = "";
      vidFeed.style.display = "block";
    }

    // ---- Helpers ----
    function segToDate(segName) {
      const ts = segName.replace(".mp4", "").replace("Z", "");
      const y = ts.slice(0,4), mo = ts.slice(4,6), d = ts.slice(6,8);
      const h = ts.slice(9,11), mi = ts.slice(11,13), s = ts.slice(13,15);
      return new Date(`${y}-${mo}-${d}T${h}:${mi}:${s}Z`);
    }
    function formatTime(date) {
      return date.toISOString().slice(11, 19);
    }
    function setActive(btn) {
      document.querySelectorAll(".controls button").forEach(b => b.classList.remove("active"));
      if (btn) btn.classList.add("active");
    }

    // ---- Camera list ----
    let camerasData = [];  // array from /api/cameras

    function getCam(id) {
      return camerasData.find(c => c.id === id);
    }

    async function loadCameras() {
      try {
        const resp = await fetch("/api/cameras");
        camerasData = await resp.json();
        cameraSelect.innerHTML = "";
        if (camerasData.length === 0) {
          cameraSelect.innerHTML = '<option>No cameras</option>';
          return;
        }
        camerasData.forEach(cam => {
          const opt = document.createElement("option");
          opt.value = cam.id; opt.textContent = cam.name || cam.id;
          cameraSelect.appendChild(opt);
        });
        currentCamera = camerasData[0].id;
        seekTo(0);
        loadSegments();
      } catch (e) {
        statusText.textContent = "Backend offline";
      }
    }

    // ---- Core: seek to N seconds behind live ----
    function seekTo(seconds) {
      if (!currentCamera) return;
      seconds = Math.max(0, Math.round(seconds));

      if (seconds <= 30) {
        // API 1: live endpoint with offset (ring buffer, catches up to live)
        mode = "live";
        activeSegmentIndex = -1;
        showImg();
        const params = new URLSearchParams();
        if (seconds > 0) params.set("offset", seconds);
        if (annotated) params.set("annotated", "1");
        const qs = params.toString();
        const url = `/api/stream/${currentCamera}/live` + (qs ? `?${qs}` : "");
        imgFeed.src = url;

        if (seconds === 0) {
          statusText.textContent = "Live";
          modeBadge.textContent = "LIVE";
          modeBadge.className = "overlay live-badge";
          btnLive.className = "live-btn";
        } else {
          statusText.textContent = `-${seconds}s`;
          modeBadge.textContent = `-${seconds}s`;
          modeBadge.className = "overlay playback-badge";
          btnLive.className = "live-btn dimmed";
        }
      } else {
        // API 2: history endpoint with unix timestamp
        mode = "history";
        activeSegmentIndex = -1;
        const t = (Date.now() / 1000) - seconds;
        showVid();
        const histParams = new URLSearchParams({ t });
        if (annotated) histParams.set("annotated", "1");
        vidFeed.src = `/api/stream/${currentCamera}/history?${histParams}`;
        vidFeed.load();
        vidFeed.play();

        const targetDate = new Date(t * 1000);
        statusText.textContent = formatTime(targetDate);
        modeBadge.textContent = `-${seconds}s`;
        modeBadge.className = "overlay playback-badge";
        btnLive.className = "live-btn dimmed";

        // Find which segment this is for highlighting
        highlightSegmentForTime(t);
        startAutoAdvance(t);
      }
      statusDot.className = "status-dot live";
      highlightSegment(activeSegmentIndex);
    }

    // ---- History: auto-advance segments ----
    function startAutoAdvance(startUnix) {
      clearInterval(progressTimer);
      progressTimer = setInterval(() => {
        if (!vidFeed.duration || !isFinite(vidFeed.duration)) return;
        const bar = document.querySelector("#segmentList li.active .progress");
        if (bar) bar.style.width = `${(vidFeed.currentTime / vidFeed.duration) * 100}%`;
      }, 250);
    }

    vidFeed.addEventListener("ended", () => {
      if (mode !== "history") return;
      // Load next segment
      if (activeSegmentIndex >= 0 && activeSegmentIndex + 1 < segments.length) {
        playSegmentByIndex(activeSegmentIndex + 1);
      } else {
        seekTo(0); // caught up, go live
      }
    });

    function playSegmentByIndex(index) {
      if (!currentCamera || index < 0 || index >= segments.length) {
        seekTo(0); return;
      }
      mode = "history";
      activeSegmentIndex = index;
      const segName = segments[index];
      const segDate = segToDate(segName);
      const t = segDate.getTime() / 1000;

      showVid();
      const segParams = new URLSearchParams({ t });
      if (annotated) segParams.set("annotated", "1");
      vidFeed.src = `/api/stream/${currentCamera}/history?${segParams}`;
      vidFeed.load();
      vidFeed.play();

      statusText.textContent = formatTime(segDate);
      modeBadge.textContent = formatTime(segDate);
      modeBadge.className = "overlay playback-badge";
      btnLive.className = "live-btn dimmed";
      highlightSegment(index);
      startAutoAdvance(t);
    }

    function highlightSegmentForTime(unixT) {
      const target = new Date(unixT * 1000);
      for (let i = 0; i < segments.length; i++) {
        const segDate = segToDate(segments[i]);
        const segEnd = new Date(segDate.getTime() + 30000);
        if (segDate <= target && target < segEnd) {
          activeSegmentIndex = i;
          return;
        }
      }
    }

    // ---- Segments list ----
    async function loadSegments() {
      if (!currentCamera) return;
      try {
        const resp = await fetch("/api/cameras");
        camerasData = await resp.json();
        const cam = getCam(currentCamera);
        if (!cam || !cam.segments || cam.segments.length === 0) {
          segments = [];
          segmentList.innerHTML = '<li class="empty">No segments yet</li>';
          return;
        }
        segments = cam.segments.slice().sort();
        renderSegmentList();
      } catch (e) { /* ignore */ }
    }

    function renderSegmentList() {
      segmentList.innerHTML = "";
      segments.slice().reverse().forEach((seg, revIdx) => {
        const realIdx = segments.length - 1 - revIdx;
        const li = document.createElement("li");
        const segDate = segToDate(seg);
        li.textContent = `${formatTime(segDate)}  ${seg}`;
        li.dataset.index = realIdx;
        if (realIdx === activeSegmentIndex) li.classList.add("active");
        const bar = document.createElement("div");
        bar.className = "progress";
        li.appendChild(bar);
        li.addEventListener("click", () => playSegmentByIndex(realIdx));
        segmentList.appendChild(li);
      });
    }

    function highlightSegment(index) {
      document.querySelectorAll("#segmentList li").forEach(li => {
        li.classList.toggle("active", parseInt(li.dataset.index) === index);
        const bar = li.querySelector(".progress");
        if (bar && parseInt(li.dataset.index) !== index) bar.style.width = "0%";
      });
    }

    // ---- Button events ----
    cameraSelect.addEventListener("change", () => {
      currentCamera = cameraSelect.value;
      seekTo(0);
      loadSegments();
    });

    btnLive.addEventListener("click", () => { seekTo(0); setActive(btnLive); });

    document.getElementById("btnBack5").addEventListener("click", function() { seekTo(5); setActive(this); });
    document.getElementById("btnBack10").addEventListener("click", function() { seekTo(10); setActive(this); });
    document.getElementById("btnBack30").addEventListener("click", function() { seekTo(30); setActive(this); });
    document.getElementById("btnBack120").addEventListener("click", function() { seekTo(120); setActive(this); });

    document.getElementById("btnCustom").addEventListener("click", function() {
      const val = parseInt(document.getElementById("customOffset").value) || 0;
      seekTo(val); setActive(this);
    });
    document.getElementById("customOffset").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        const val = parseInt(e.target.value) || 0;
        seekTo(val); setActive(document.getElementById("btnCustom"));
      }
    });

    // ---- Status polling ----
    async function pollStatus() {
      if (!currentCamera) return;
      try {
        const resp = await fetch("/api/cameras");
        camerasData = await resp.json();
        const cam = getCam(currentCamera);
        if (cam && cam.connected) {
          statusDot.className = "status-dot live";
        } else {
          statusDot.className = "status-dot off";
          statusText.textContent = "Camera disconnected";
        }
      } catch (e) {
        statusDot.className = "status-dot off";
        statusText.textContent = "Backend offline";
      }
    }

    setInterval(loadSegments, 10000);
    setInterval(pollStatus, 3000);
    loadCameras();
  </script>
</body>
</html>
